<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>名真 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="./avatar.png" />

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0e7ff, #fce7f3);
  height: 100vh;
  overflow: hidden;
}

.main {
  display: flex;
  height: 100vh;
}

/* 左 */
.left-panel {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.vtuber {
  height: 80%;
}

/* 右 */
.right-panel {
  width: 55%;
  display: flex;
  flex-direction: column;
}

/* 聊天 */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 120px; /* 給輸入框空間 */
}

.chat-row {
  display: flex;
  margin-bottom: 14px;
  gap: 10px;
}

.chat-row.user {
  justify-content: flex-end;
}

.chat-row.bot {
  justify-content: flex-start;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.bubble {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.6;
}

.user .bubble {
  background: linear-gradient(135deg, #4f7cff, #6c8cff);
  color: white;
}

.bot .bubble {
  background: white;
  color: #333;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* 🔥 輸入框（改成全畫面固定） */
.input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  padding: 15px 20px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
  z-index: 999;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 14px 20px;
  border: none;
  background: linear-gradient(135deg, #4f7cff, #6c8cff);
  color: white;
  border-radius: 12px;
  cursor: pointer;
}

/* 🔥 手機版（768以下） */
@media (max-width: 768px) {

  .left-panel {
    width: 25%;  /* 1 */
  }

  .right-panel {
    width: 75%;  /* 3 */
  }

  .vtuber {
    height: 60%;
  }

  .bubble {
    max-width: 85%;
    font-size: 14px;
  }

  .chat-area {
    padding-bottom: 140px; /* 手機多留一點 */
  }

}

</style>
</head>

<body>

<div class="main">

  <!-- 左 -->
  <div class="left-panel">
    <img id="vtuber" class="vtuber" src="./pic1a.png">
  </div>

  <!-- 右 -->
  <div class="right-panel">
    <div class="chat-area" id="chat"></div>
  </div>

</div>

<!-- 🔥 移到最外層（全畫面） -->
<div class="input-bar">
  <input id="input" type="text" placeholder="跟名真說點什麼…" />
  <button onclick="sendMessage()">送出</button>
</div>

<script>

/* VTuber 輪播 */
const images = [
  "./pic1a.png",
  "./pic2a.png",
  "./pic3a.png",
  "./pic4a.png"
];

let index = 0;
setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("vtuber").src = images[index];
}, 1000);


/* 聊天 */
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const row = document.createElement("div");
  row.className = "chat-row " + type;

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = type === "user" ? "./user-avatar.png" : "./avatar.png";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  if (type === "user") {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}


/* webhook */
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch("https://zm2283765.app.n8n.cloud/webhook/vtuber", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await res.json();
    addMessage(data.reply || "（沒有回應）", "bot");

  } catch (err) {
    addMessage("⚠️ 連線失敗", "bot");
  }
}

/* Enter */
document.getElementById("input").addEventListener("keydown", function (e) {
  if (e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
