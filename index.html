<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>VTuber 聊天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* 左側輪播 */
    .left {
      width: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left img {
      width: 90%;
      border-radius: 20px;
    }

    /* 右側聊天 */
    .right {
      width: 50%;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    .user {
      text-align: right;
      color: #4fc3f7;
    }

    .bot {
      text-align: left;
      color: #fff;
    }

    input, button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px 0;
    }

    input {
      width: 100%;
    }

    button {
      background: #4fc3f7;
      color: #000;
      cursor: pointer;
    }

    /* 手機版 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left {
        width: 100%;
        padding: 20px 0;
      }

      .left img {
        width: 80%;
      }

      .right {
        width: 100%;
        padding: 15px;
      }

      button {
        margin-right: 10px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 左側輪播 -->
  <div class="left">
    <img id="slide" src="https://picsum.photos/500/700?random=1">
  </div>

  <!-- 右側聊天 -->
  <div class="right">

    <!-- Step 1 換名字 -->
    <button onclick="changeName()">換名字</button>

    <!-- Step 2 輸入名字 -->
    <input id="nameInput" placeholder="請輸入你的名字">

    <!-- Step 3 進入聊天 -->
    <button onclick="startChat()">開始聊天</button>

    <!-- 聊天區 -->
    <div id="chatBox"></div>

    <!-- Step 4 傳送訊息 -->
    <input id="msgInput" placeholder="輸入訊息">
    <button onclick="sendMsg()">送出</button>

  </div>
</div>

<script>

let userName = "";
let started = false;

/* 輪播 */
let images = [
  "https://picsum.photos/500/700?random=1",
  "https://picsum.photos/500/700?random=2",
  "https://picsum.photos/500/700?random=3"
];

let index = 0;

setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("slide").src = images[index];
}, 3000);


/* 換名字 */
function changeName() {
  userName = "";
  document.getElementById("chatBox").innerHTML = "";
  alert("已清除名字，請重新輸入");
}

/* 開始聊天 */
function startChat() {
  const name = document.getElementById("nameInput").value.trim();

  if (!name) {
    alert("請輸入名字");
    return;
  }

  userName = name;
  started = true;

  addMsg("bot", `你好 ${userName} 👋 我是你的 VTuber`);
}

/* 傳送訊息 */
function sendMsg() {
  if (!started) {
    alert("請先輸入名字並開始聊天");
    return;
  }

  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text) return;

  addMsg("user", text);

  // 模擬回覆
  setTimeout(() => {
    addMsg("bot", `${userName}，你說的是：「${text}」`);
  }, 500);

  input.value = "";
}

/* 顯示訊息 */
function addMsg(role, text) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
