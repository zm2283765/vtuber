<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>名真 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="./avatar.png" />

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0e7ff, #fce7f3);
  height: 100vh;
  overflow: hidden;
}

.main {
  display: flex;
  height: 100vh;
}

/* 🔥 左側 */
.left-panel {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
}

.vtuber {
  height: 70%;
}

/* 右側 */
.right-panel {
  width: 55%;
  display: flex;
  flex-direction: column;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 120px;
}

/* 聊天 */
.chat-row {
  display: flex;
  margin-bottom: 14px;
  gap: 10px;
}

.chat-row.user {
  justify-content: flex-end;
}

.chat-row.bot {
  justify-content: flex-start;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.bubble {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.6;
}

.user .bubble {
  background: linear-gradient(135deg, #4f7cff, #6c8cff);
  color: white;
}

.bot .bubble {
  background: white;
  color: #333;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* 🔥 輸入框 */
.input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  padding: 15px 24px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
  z-index: 999;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  outline: none;
}

button {
  margin-left: 12px;
  padding: 14px 22px;
  border: none;
  background: linear-gradient(135deg, #4f7cff, #6c8cff);
  color: white;
  border-radius: 12px;
  cursor: pointer;
}

/* 👤 使用者資訊 */
.user-bar {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.user-bar button {
  padding: 6px 10px;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- 👤 使用者顯示 -->
<div class="user-bar">
  <span id="username"></span>
  <button onclick="changeName()">換名字</button>
</div>

<div class="main">
  <div class="left-panel">
    <img id="vtuber" class="vtuber" src="./pic1a.png">
  </div>

  <div class="right-panel">
    <div class="chat-area" id="chat"></div>
  </div>
</div>

<div class="input-bar">
  <input id="input" type="text" placeholder="跟名真說點什麼…" />
  <button onclick="sendMessage()">送出</button>
</div>

<script>

/* ✅ Step1：取得或建立 user_id */
function getUserId() {
  let userId = localStorage.getItem("user_id");

  if (!userId) {
    userId = prompt("請輸入你的名字或暱稱");

    if (!userId || userId.trim() === "") {
      userId = "guest_" + Math.random().toString(36).substring(2, 8);
    }

    localStorage.setItem("user_id", userId);
  }

  return userId;
}

/* ✅ Step2：顯示名字 */
function showUserName() {
  const userId = getUserId();
  document.getElementById("username").innerText = "👤 " + userId;
}

showUserName();

/* ✅ Step3：換名字 */
function changeName() {
  const newName = prompt("請輸入新的名字");

  if (!newName || newName.trim() === "") {
    alert("名字不能是空的喔！");
    return;
  }

  if (!confirm("確定要換名字嗎？記憶會分開喔")) return;

  localStorage.setItem("user_id", newName.trim());

  showUserName();

  document.getElementById("chat").innerHTML = "";

  alert("已更換為：" + newName);
}

/* 輪播 */
const images = [
  "./pic1a.png",
  "./pic2a.png",
  "./pic3a.png",
  "./pic4a.png"
];

let index = 0;
setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("vtuber").src = images[index];
}, 1000);

/* 聊天 */
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const row = document.createElement("div");
  row.className = "chat-row " + type;

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = type === "user" ? "./user-avatar.png" : "./avatar.png";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  if (type === "user") {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

/* ✅ Step4：每次送出抓最新 user_id */
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  const userId = getUserId(); // 🔥 重點

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch("https://zm2283765.app.n8n.cloud/webhook/vtuber", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: userId,
        message: text
      })
    });

    const data = await res.json();
    addMessage(data.reply || "（沒有回應）", "bot");

  } catch (err) {
    addMessage("⚠️ 連線失敗", "bot");
  }
}

document.getElementById("input").addEventListener("keydown", function (e) {
  if (e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
