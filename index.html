<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>名真 Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="./avatar.png" />

    <style>
      * {
        box-sizing: border-box; /* ✅ 關鍵 */
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #e0e7ff, #fce7f3);
        height: 100vh;
        overflow: hidden;
      }

      .main {
        display: flex;
        height: 100vh;
      }

      /* 左 */
      .left-panel {
        width: 45%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .vtuber {
        height: 80%;
      }

      /* 右 */
      .right-panel {
        width: 55%;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 25px;
        padding-bottom: 120px; /* ✅ 預留空間 */
      }

      .chat-row {
        display: flex;
        margin-bottom: 14px;
        gap: 10px;
      }

      .chat-row.user {
        justify-content: flex-end;
      }

      .chat-row.bot {
        justify-content: flex-start;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
      }

      .bubble {
        max-width: 65%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 16px;
        line-height: 1.6;
      }

      .user .bubble {
        background: linear-gradient(135deg, #4f7cff, #6c8cff);
        color: white;
      }

      .bot .bubble {
        background: white;
        color: #333;
      }

      /* ✅ 關鍵修正區 */
      .input-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0; /* 🔥 取代 width:100% */

        display: flex;
        padding: 15px 20px;

        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);

        box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.08);
      }

      input {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #ddd;
        font-size: 16px;
      }

      button {
        margin-left: 10px;
        padding: 14px 20px;
        border: none;
        background: linear-gradient(135deg, #4f7cff, #6c8cff);
        color: white;
        border-radius: 12px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <!-- 左 VTuber -->
      <div class="left-panel">
        <img id="vtuber" class="vtuber" src="./pic1a.png" />
      </div>

      <!-- 右 聊天 -->
      <div class="right-panel">
        <div class="chat-area" id="chat"></div>

        <div class="input-bar">
          <input id="input" type="text" placeholder="跟名真說點什麼…" />
          <button onclick="sendMessage()">送出</button>
        </div>
      </div>
    </div>

    <script>
            /* 輪播 1秒 */
            const images = [
              "./pic1a.png",
              "./pic2a.png",
              "./pic3a.png",
              "./pic4a.png",
            ];
            let index = 0;

            setInterval(() => {
              index = (index + 1) % images.length;
              document.getElementById("vtuber").src = images[index];
            }, 1000);

            function addMessage(text, type) {
              const chat = document.getElementById("chat");

              const row = document.createElement("div");
              row.className = "chat-row " + type;

              const avatar = document.createElement("img");
              avatar.className = "avatar";
              avatar.src = type === "user" ? "./user-avatar.png" : "./avatar.png";

              const bubble = document.createElement("div");
              bubble.className = "bubble";
              bubble.innerText = text;

              if (type === "user") {
                row.appendChild(bubble);
                row.appendChild(avatar);
              } else {
                row.appendChild(avatar);
                row.appendChild(bubble);
              }

              chat.appendChild(row);
              chat.scrollTop = chat.scrollHeight;
            }

            function sendMessage() {
              const input = document.getElementById("input");
              const text = input.value.trim();
              if (!text) return;

              addMessage(text, "user");
              input.value = "";


              async function sendMessage() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        try {
          const res = await fetch("https://zm2283765.app.n8n.cloud/webhook/vtuber", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: text
            })
          });

          const data = await res.json();

          addMessage(data.reply, "bot");

        } catch (err) {
          addMessage("⚠️ 發生錯誤，請稍後再試", "bot");
        }
      }

            document
              .getElementById("input")
              .addEventListener("keydown", function (e) {
                if (e.key === "Enter") sendMessage();
              });
    </script>
  </body>
</html>
